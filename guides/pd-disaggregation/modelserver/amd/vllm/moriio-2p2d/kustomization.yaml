apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 2P2D Wide-EP-16: DP=EP=16, TP=1 across 2 prefill + 2 decode pods.
#
# STATUS: EXPERIMENTAL
# The MoRI-IO WRITE-mode feature in the sidecar is dormant. This guide
# can be used for development and testing but requires enabling the
# feature flag in llm-d-inference-scheduler before production use.
#
# Inherits from the 1P1D moriio/ base (DP=EP=8) and extends it to
# multi-pod topology with:
#   1. Child deployments (prefill-child, decode-child) for ranks 8..15
#   2. Master patches for DP=16 with cross-pod coordinator
#   3. Sidecar patches for multi-pod fan-out
#   4. ConfigMap for centralized endpoint configuration
#   5. NCCL/fabric env for cross-pod RDMA
#   6. Recreate strategy (prevents rolling update wedge)

namespace: llm-d

resources:
  - ../moriio
  - moriio-config.yaml
  - inductor-shim-configmap.yaml
  - children.yaml

labels:
  - pairs:
      llm-d.ai/topology: 2p2d
      llm-d.ai/dp-size: "16"
      llm-d.ai/status: experimental
    includeSelectors: false
    includeTemplates: true

patches:
  # Master pod patches: DP=8 → DP=16
  - path: patch-prefill-master.yaml
    target:
      kind: Deployment
      name: pd-disaggregation-rocm-moriio-vllm-prefill
  - path: patch-decode-master.yaml
    target:
      kind: Deployment
      name: pd-disaggregation-rocm-moriio-vllm-decode
  # Sidecar multi-pod fan-out configuration
  - path: patch-sidecar-2p2d.yaml
    target:
      kind: Deployment
      name: pd-disaggregation-rocm-moriio-vllm-decode
  # NCCL/RCCL/MoRI fabric env on all 4 model-server pods
  - path: patch-nccl-env.yaml
    target:
      kind: Deployment
      name: pd-disaggregation-rocm-moriio-vllm-prefill
  - path: patch-nccl-env.yaml
    target:
      kind: Deployment
      name: pd-disaggregation-rocm-moriio-vllm-prefill-child
  - path: patch-nccl-env.yaml
    target:
      kind: Deployment
      name: pd-disaggregation-rocm-moriio-vllm-decode
  - path: patch-nccl-env.yaml
    target:
      kind: Deployment
      name: pd-disaggregation-rocm-moriio-vllm-decode-child
  # Recreate strategy on all 4 model-server pods
  - path: patch-strategy-recreate.yaml
    target:
      kind: Deployment
      name: pd-disaggregation-rocm-moriio-vllm-prefill
  - path: patch-strategy-recreate.yaml
    target:
      kind: Deployment
      name: pd-disaggregation-rocm-moriio-vllm-prefill-child
  - path: patch-strategy-recreate.yaml
    target:
      kind: Deployment
      name: pd-disaggregation-rocm-moriio-vllm-decode
  - path: patch-strategy-recreate.yaml
    target:
      kind: Deployment
      name: pd-disaggregation-rocm-moriio-vllm-decode-child
