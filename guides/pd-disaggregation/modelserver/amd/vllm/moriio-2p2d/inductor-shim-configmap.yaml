# Inductor autotune shim for Wide-EP DP=16
#
# STATUS: WORKAROUND - Prevents DP=16 hang during inductor benchmark loop
#
# Without this shim, the first dummy forward stalls in the Inductor per-config
# benchmark loop. The autotune invokes a fused RMS-norm reduction kernel that
# triggers a cross-rank collective; ranks desync and the DP=16 world hangs.
#
# Disabling pointwise autotune short-circuits the sweep to a single default
# config. sitecustomize runs before vLLM imports torch._inductor.
apiVersion: v1
kind: ConfigMap
metadata:
  name: inductor-autotune-shim
  labels:
    llm-d.ai/component: inductor-shim
data:
  sitecustomize.py: |
    # Disable torch._inductor pointwise autotune before vLLM imports it.
    try:
        import torch._inductor.config as _ic
        try:
            _ic.triton.autotune_pointwise = False
        except Exception:
            pass
        try:
            _ic.benchmark_kernel = False
        except Exception:
            pass
        try:
            _ic.autotune_local_cache = True
        except Exception:
            pass
        import sys
        print(
            "[inductor-shim] cfg.triton.autotune_pointwise = "
            + repr(getattr(_ic.triton, "autotune_pointwise", "<missing>")),
            file=sys.stderr, flush=True,
        )
    except ImportError:
        pass
    except Exception as _e:
        import sys
        print("[inductor-shim] failed: " + repr(_e), file=sys.stderr, flush=True)
