# Decode MASTER: widen from DP=8 (1P1D) to DP=16 (2P2D).
#
# Changes from the inherited moriio/ base:
#   - data-parallel-size: 8 → 16
#   - Adds cross-pod DP coordinator address
#   - Uses different RPC port (13346) than prefill (13345)
#   - References ConfigMap for ZMQ proxy IP
#
# The child pod (decode-child) connects to this master's coordinator
# with --data-parallel-start-rank=8 --headless.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: decode
spec:
  template:
    spec:
      containers:
        - name: modelserver
          args:
            - "deepseek-ai/DeepSeek-V3"
            - "--served-model-name=deepseek-ai/DeepSeek-V3"
            - "--disable-uvicorn-access-log"
            - "--port=8200"
            - "--tensor-parallel-size=1"
            - "--gpu-memory-utilization=0.75"
            - "--kv-cache-memory-bytes=20000000000"
            - "--data-parallel-size=16"
            - "--data-parallel-size-local=8"
            - "--data-parallel-address=$(POD_IP)"
            - "--data-parallel-rpc-port=13346"
            - "--api-server-count=8"
            - "--enable-expert-parallel"
            - "--all2all-backend=mori_low_latency"
            - "--block-size=16"
            - "--no-enable-prefix-caching"
            - "--max-model-len=32768"
            - "--compilation-config"
            - '{"cudagraph_mode":"NONE"}'
            - "--kv-transfer-config"
            - '{"kv_connector":"MoRIIOConnector","kv_role":"kv_consumer","kv_connector_extra_config":{"proxy_ip":"$(ZMQ_PROXY_HOST)","proxy_ping_port":"10001","http_port":"8000","handshake_port":"6301","notify_port":"61005"}}'
          envFrom:
            - configMapRef:
                name: moriio-2p2d-config
