# Decode sidecar: multi-pod fan-out flags for 2P2D.
#
# STATUS: EXPERIMENTAL (requires MoRIIOFeatureEnabled=true in sidecar)
#
# Changes from the inherited moriio/ sidecar:
#   - --moriio-dp-size: 8 → 16
#   - --moriio-dp-size-local=8
#   - --moriio-remote-hosts (prefill pod IPs from ConfigMap)
#   - --moriio-decode-hosts (decode pod IPs from ConfigMap)
#
# The sidecar routes requests to the correct DP rank's pod using:
#   pod_idx = global_dp_rank // dp_size_local
#   host = remote_hosts[pod_idx]
apiVersion: apps/v1
kind: Deployment
metadata:
  name: decode
spec:
  template:
    spec:
      initContainers:
        - name: routing-proxy
          args:
            - --port=8000
            - --vllm-port=8200
            - --connector=nixlv2
            - --zap-log-level=1
            - --secure-proxy=false
            - --moriio-write-mode
            - --moriio-dp-size=16
            - --moriio-dp-size-local=8
            - --moriio-tp-size=1
            - --moriio-remote-hosts=$(PREFILL_MASTER_HOST),$(PREFILL_CHILD_HOST)
            - --moriio-decode-hosts=$(DECODE_MASTER_HOST),$(DECODE_CHILD_HOST)
            - --moriio-parallel-dispatch
            - --moriio-local-pod-ip=$(POD_IP)
          envFrom:
            - configMapRef:
                name: moriio-2p2d-config
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
