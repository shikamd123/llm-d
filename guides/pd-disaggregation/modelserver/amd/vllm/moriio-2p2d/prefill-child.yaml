# prefill-child Deployment: the second half of the Wide-EP-16 prefill DP
# world (ranks 8..15). It joins the master's DP coordinator in headless
# mode (no OAI front-end; only the master pod receives client traffic).
#
# This is a standalone Deployment, not a patch on the parent overlay's
# prefill, so adding/removing this overlay never mutates the 1P1D base.
# The spec is intentionally a near-clone of ../moriio/patch-prefill.yaml;
# keep it in sync when bumping the parent.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pd-disaggregation-rocm-moriio-vllm-prefill-child
  labels:
    llm-d.ai/role: prefill-child
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pd-disaggregation-rocm-moriio-vllm-prefill-child
  template:
    metadata:
      labels:
        app: pd-disaggregation-rocm-moriio-vllm-prefill-child
        llm-d.ai/role: prefill-child
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: REPLACE_PREFILL_CHILD_NODE
      containers:
        - name: modelserver
          image: REPLACE_MODEL_SERVER_IMAGE
          imagePullPolicy: IfNotPresent
          command: ["vllm", "serve"]
          args:
            - "/models/DeepSeek-V3"
            - "--served-model-name=deepseek-ai/DeepSeek-V3"
            - "--disable-uvicorn-access-log"
            - "--tensor-parallel-size=1"
            - "--gpu-memory-utilization=0.80"
            - "--data-parallel-size=16"
            - "--data-parallel-size-local=8"
            # Headless child: connect to the prefill-master DP coordinator
            # and claim global ranks 8..15 (start = 1 * dp_size_local).
            - "--data-parallel-address=REPLACE_PREFILL_MASTER_IP"
            - "--data-parallel-rpc-port=13345"
            - "--data-parallel-start-rank=8"
            - "--headless"
            - "--enable-expert-parallel"
            - "--all2all-backend=mori_high_throughput"
            - "--block-size=1"
            - "--no-enable-prefix-caching"
            - "--max-model-len=32768"
            - "--distributed-timeout-seconds=7200"
            - "--compilation-config"
            - '{"cudagraph_mode":"PIECEWISE"}'
            - "--kv-transfer-config"
            - '{"kv_connector":"MoRIIOConnector","kv_role":"kv_producer","kv_connector_extra_config":{"proxy_ip":"REPLACE_ZMQ_PROXY_IP","proxy_ping_port":"10001","http_port":"8000","handshake_port":"6301","notify_port":"61005"}}'
          env:
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: HF_TOKEN
              valueFrom: { secretKeyRef: { name: llm-d-hf-token, key: HF_TOKEN } }
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom: { secretKeyRef: { name: llm-d-hf-token, key: HF_TOKEN } }
            - { name: HF_HUB_OFFLINE, value: "1" }
            - { name: TRANSFORMERS_OFFLINE, value: "1" }
            - { name: VLLM_MORIIO_CONNECTOR_READ_MODE, value: "0" }
            - { name: VLLM_ENGINE_READY_TIMEOUT_S, value: "1800" }
            - { name: VLLM_ROCM_USE_AITER, value: "1" }
            - { name: VLLM_ROCM_USE_AITER_MOE, value: "1" }
            - { name: VLLM_ROCM_USE_AITER_PAGED_ATTN, value: "0" }
            - { name: VLLM_ROCM_USE_AITER_RMSNORM, value: "1" }
            - { name: VLLM_ROCM_USE_AITER_MLA, value: "1" }
            - { name: TORCHINDUCTOR_BENCHMARK_KERNEL, value: "0" }
            - { name: VLLM_ROLE, value: "prefill-child" }
            - { name: SKIP_RUNTIME_PATCH, value: "1" }
            - { name: HSA_ENABLE_SDMA, value: "1" }
            - { name: HSA_FORCE_FINE_GRAIN_PCIE, value: "1" }
            - { name: PYTHONPATH, value: "/etc/python-shim" }
          ports:
            - { containerPort: 6301,  name: mori-handshake, protocol: TCP }
            - { containerPort: 61005, name: mori-notify,    protocol: TCP }
          resources:
            limits:   { cpu: "200", memory: 1500Gi, amd.com/gpu: "8", rdma/ib: "1" }
            requests: { cpu: "200", memory: 1500Gi, amd.com/gpu: "8", rdma/ib: "1" }
          securityContext:
            privileged: true
            capabilities: { add: ["IPC_LOCK", "SYS_PTRACE", "NET_RAW"] }
          volumeMounts:
            - { mountPath: /dev/shm, name: shm }
            - { mountPath: /.cache,  name: torch-compile-cache }
            - { mountPath: /opt/vllm_cache, name: vllm-cache-host }
            - { mountPath: /etc/python-shim, name: inductor-shim, readOnly: true }
            - { mountPath: /models/DeepSeek-V3, name: dsv3-weights, readOnly: true }
            - { mountPath: /dev/kfd, name: dev-kfd }
            - { mountPath: /dev/dri, name: dev-dri }
            - { mountPath: /dev/infiniband, name: dev-ib }
            - { mountPath: /sys/class/infiniband, name: sys-class-ib, readOnly: true }
            - { mountPath: /sys/class/net,        name: sys-class-net, readOnly: true }
          # Headless child has no OAI front-end; use a TCP readiness on the
          # MoRI handshake port the engine binds once DP workers are up.
          startupProbe:
            tcpSocket: { port: 6301 }
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 120
          livenessProbe:
            tcpSocket: { port: 6301 }
            periodSeconds: 30
            failureThreshold: 5
      initContainers:
        - name: vllm-cache-seed
          image: REPLACE_MODEL_SERVER_IMAGE
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/entrypoint-seed-cache.sh"]
          env:
            - { name: VLLM_ROLE, value: "prefill-child" }
          volumeMounts:
            - { mountPath: /opt/vllm_cache, name: vllm-cache-host }
      volumes:
        - { name: shm, emptyDir: { medium: Memory, sizeLimit: 64Gi } }
        - { name: torch-compile-cache, emptyDir: {} }
        - name: dsv3-weights
          hostPath: { path: REPLACE_MODEL_HOST_PATH, type: Directory }
        - name: vllm-cache-host
          hostPath: { path: REPLACE_CACHE_HOST_PATH/prefill-child, type: DirectoryOrCreate }
        - name: inductor-shim
          configMap: { name: inductor-autotune-shim, defaultMode: 0444 }
        - { name: dev-kfd,        hostPath: { path: /dev/kfd } }
        - { name: dev-dri,        hostPath: { path: /dev/dri } }
        - { name: dev-ib,         hostPath: { path: /dev/infiniband } }
        - { name: sys-class-ib,   hostPath: { path: /sys/class/infiniband } }
        - { name: sys-class-net,  hostPath: { path: /sys/class/net } }
